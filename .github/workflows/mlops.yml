name: MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with Ruff
        run: ruff check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download Quantized Model
        run: |
          mkdir -p models/quantized_gguf
          python -c "
          from huggingface_hub import hf_hub_download
          hf_hub_download(
              repo_id='adhal/pii-redactor-qwen-Q4_K_M-GGUF',
              filename='pii-redactor-qwen-q4_k_m.gguf',
              local_dir='models/quantized_gguf'
          )
          "
          
      - name: Run Tests
        run: pytest tests/

      - name: Push Model to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }} 
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          
          # Initialize the API using your secret token
          api = HfApi(token=os.environ['HF_TOKEN'])
          
          print('Uploading GGUF model to Hugging Face...')
          api.upload_file(
              path_or_fileobj='models/quantized_gguf/pii-redactor-qwen-q4_k_m.gguf',
              path_in_repo='pii-redactor-qwen-q4_k_m_verified.gguf', # Renaming slightly to prove it uploaded!
              repo_id='adhal/pii-redactor-qwen-Q4_K_M-GGUF',
              repo_type='model'
          )
          print('Upload complete!')
          "
